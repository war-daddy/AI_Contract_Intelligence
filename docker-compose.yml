version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  db:
    image: ankane/pgvector
    environment:
      POSTGRES_DB: ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

  redis:
    image: redis:7

  worker:
    build: .
    command: celery -A app.workers.tasks worker --loglevel=info
    depends_on:
      - redis
